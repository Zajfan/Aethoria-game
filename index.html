<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Aethoria</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0f; overflow:hidden; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
    #game-container { width:100%; height:100%; }
    canvas { display:block; margin:0 auto; image-rendering:pixelated; }

    #api-modal {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.88); z-index:2000;
      align-items:center; justify-content:center;
      font-family:'Courier New',monospace; color:#d4af37;
    }
    #api-modal.show { display:flex; }
    .modal-box { background:#0d1117; border:1px solid #d4af37; padding:36px 44px; max-width:480px; width:92%; border-radius:4px; }
    .modal-box h2 { font-size:18px; margin-bottom:8px; }
    .modal-box p  { font-size:12px; color:#777; margin-bottom:22px; line-height:1.7; }
    .modal-box input { width:100%; background:#161b22; border:1px solid #444; color:#fff; padding:10px 14px; font-family:monospace; font-size:13px; border-radius:3px; margin-bottom:16px; outline:none; }
    .modal-box input:focus { border-color:#d4af37; }
    .modal-box .btn-row { display:flex; gap:10px; }
    .modal-box button { background:#d4af37; color:#0a0a0f; border:none; padding:10px 22px; font-family:monospace; font-size:13px; font-weight:bold; cursor:pointer; border-radius:3px; }
    .modal-box .skip { background:transparent; color:#666; border:1px solid #444; }

    #dialogue-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.45); z-index:1500;
      align-items:flex-end; justify-content:center; padding-bottom:180px;
    }
    #dialogue-overlay.show { display:flex; }
    #dialogue-input-box {
      background:#0d1117; border:1px solid #d4af37;
      border-radius:3px; display:flex; gap:8px;
      padding:8px 12px; width:min(600px, 94vw);
    }
    #dialogue-input-box input {
      flex:1; background:transparent; border:none; outline:none;
      color:#fff; font-family:monospace; font-size:14px;
    }
    #dialogue-input-box button {
      background:#d4af37; border:none; color:#0a0a0f;
      padding:6px 16px; font-family:monospace; font-size:12px;
      font-weight:bold; cursor:pointer; border-radius:2px;
    }
  </style>
</head>
<body>
<div id="game-container"></div>

<!-- Error overlay — visible if JS crashes before Phaser starts -->
<div id="err-overlay" style="display:none;position:fixed;inset:0;background:#0a0a0f;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:Courier New,monospace;color:#ff6666;padding:32px;text-align:center;">
  <div style="font-size:22px;color:#d4af37;margin-bottom:16px;">AETHORIA — Load Error</div>
  <div id="err-msg" style="font-size:13px;max-width:600px;line-height:1.8;color:#cc8888;"></div>
  <button onclick="localStorage.clear();location.reload(true)" style="margin-top:24px;
    background:#d4af37;color:#0a0a0f;border:none;padding:10px 24px;
    font-family:Courier New;font-size:13px;cursor:pointer;border-radius:3px;">
    Clear cache &amp; retry
  </button>
</div>

<!-- API Key Modal -->
<div id="api-modal">
  <div class="modal-box">
    <h2>Claude API Key</h2>
    <p>Aethoria uses Claude AI to power NPC dialogue, dynamic quests, and living world events. Enter your Anthropic API key to enable these features. You can skip and play without AI (NPCs will use scripted responses).</p>
    <input type="password" id="api-input" placeholder="sk-ant-api03-..." autocomplete="off">
    <div class="btn-row">
      <button id="api-save">Enable AI</button>
      <button class="skip" id="api-skip">Play without AI</button>
    </div>
  </div>
</div>

<!-- Dialogue Input Overlay -->
<div id="dialogue-overlay">
  <div id="dialogue-input-box">
    <input type="text" id="dialogue-text" placeholder="Say something to the NPC..." maxlength="200">
    <button id="dialogue-send">Send</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.88.2/dist/phaser.min.js"></script>
<script type="module" src="src/main.js"></script>

<script>
  // API modal logic
  const modal = document.getElementById('api-modal');
  if (!localStorage.getItem('aethoria_api_key') && !localStorage.getItem('aethoria_no_ai')) {
    modal.classList.add('show');
  }
  document.getElementById('api-save').onclick = () => {
    const k = document.getElementById('api-input').value.trim();
    if (k) { localStorage.setItem('aethoria_api_key', k); modal.classList.remove('show'); }
  };
  document.getElementById('api-skip').onclick = () => {
    localStorage.setItem('aethoria_no_ai','1'); modal.classList.remove('show');
  };
  document.getElementById('api-input').onkeydown = (e) => {
    if (e.key === 'Enter') document.getElementById('api-save').click();
  };
</script>
<script>
// Make the error overlay visible by default, hide once Phaser renders
var _errOverlay = document.getElementById('err-overlay');
if(_errOverlay) _errOverlay.style.display = 'flex';
window.addEventListener('phaser-ready', function(){ if(_errOverlay) _errOverlay.style.display='none'; });

window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('err-msg');
  if(el) el.textContent = (err ? err.stack : msg) + '\n\n('+src+':'+line+')';
  var ov = document.getElementById('err-overlay');
  if(ov) ov.style.display = 'flex';
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('err-msg');
  if(el) el.textContent = 'Unhandled promise: ' + (e.reason?.stack || e.reason);
  var ov = document.getElementById('err-overlay');
  if(ov) ov.style.display = 'flex';
});
</script>
</body>
</html>
