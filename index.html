<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <title>Aethoria</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0f;overflow:hidden;width:100vw;height:100vh}
    #game-container{width:100%;height:100%}
    canvas{display:block;image-rendering:pixelated}
    #err-box{display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.93);align-items:center;justify-content:center;font-family:"Courier New",monospace;padding:24px}
    #err-box.show{display:flex}
    #err-inner{background:#150000;border:1px solid #cc2222;padding:28px;max-width:680px;width:100%;border-radius:4px;color:#ff9999}
    #err-inner h2{color:#ff4444;font-size:15px;margin-bottom:10px}
    #err-inner pre{font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow:auto}
    #err-inner button{margin-top:14px;background:#cc2222;color:#fff;border:none;padding:8px 20px;font-family:monospace;font-size:12px;cursor:pointer;border-radius:3px}
    #api-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;align-items:center;justify-content:center;font-family:"Courier New",monospace}
    #api-modal.show{display:flex}
    .mbox{background:#0d1117;border:1px solid #d4af37;padding:36px 44px;max-width:480px;width:92%;border-radius:4px;color:#d4af37}
    .mbox h2{font-size:18px;margin-bottom:8px}
    .mbox p{font-size:12px;color:#666;margin-bottom:22px;line-height:1.7}
    .mbox input{width:100%;background:#161b22;border:1px solid #444;color:#fff;padding:10px 14px;font-family:monospace;font-size:13px;border-radius:3px;margin-bottom:16px;outline:none}
    .mbox input:focus{border-color:#d4af37}
    .mbox .row{display:flex;gap:10px}
    .mbox button{background:#d4af37;color:#0a0a0f;border:none;padding:10px 22px;font-family:monospace;font-size:13px;font-weight:bold;cursor:pointer;border-radius:3px}
    .mbox .skip{background:transparent;color:#666;border:1px solid #444}
    #dlg-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1500;align-items:flex-end;justify-content:center;padding-bottom:190px}
    #dlg-overlay.show{display:flex}
    #dlg-box{background:#0d1117;border:1px solid #d4af37;border-radius:3px;display:flex;gap:8px;padding:8px 12px;width:min(600px,94vw)}
    #dlg-box input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:monospace;font-size:14px}
    #dlg-box button{background:#d4af37;border:none;color:#0a0a0f;padding:6px 16px;font-family:monospace;font-size:12px;font-weight:bold;cursor:pointer;border-radius:2px}
  </style>
</head>
<body>

<div id="game-container"></div>

<div id="api-modal">
  <div class="mbox">
    <h2>Claude API Key</h2>
    <p>Aethoria uses Claude AI for NPC dialogue and quests. Enter your Anthropic API key, or skip for scripted responses.</p>
    <input type="password" id="api-input" placeholder="sk-ant-api03-..." autocomplete="off">
    <div class="row">
      <button id="api-save">Enable AI</button>
      <button class="skip" id="api-skip">Play without AI</button>
    </div>
  </div>
</div>

<div id="dlg-overlay">
  <div id="dlg-box">
    <input type="text" id="dialogue-text" placeholder="Say something to the NPC..." maxlength="200">
    <button id="dialogue-send">Send</button>
  </div>
</div>

<div id="err-box">
  <div id="err-inner">
    <h2>Aethoria failed to load</h2>
    <pre id="err-msg">Unknown error</pre>
    <button onclick="localStorage.clear();location.reload(true)">Clear cache and retry</button>
  </div>
</div>

<script>
window.onerror = function(msg,src,line,col,err){
  document.getElementById("err-msg").textContent=(err&&err.stack)?err.stack:(msg+" "+src+":"+line);
  document.getElementById("err-box").classList.add("show");
};
window.addEventListener("unhandledrejection",function(e){
  document.getElementById("err-msg").textContent="Promise error: "+((e.reason&&e.reason.stack)?e.reason.stack:String(e.reason));
  document.getElementById("err-box").classList.add("show");
});
</script>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script type="module" src="src/main.js"></script>

<script>
(function(){
  var modal=document.getElementById("api-modal");
  if(!localStorage.getItem("aethoria_api_key")&&!localStorage.getItem("aethoria_no_ai")) modal.classList.add("show");
  document.getElementById("api-save").onclick=function(){
    var k=document.getElementById("api-input").value.trim();
    if(k){localStorage.setItem("aethoria_api_key",k);modal.classList.remove("show");}
  };
  document.getElementById("api-skip").onclick=function(){
    localStorage.setItem("aethoria_no_ai","1");modal.classList.remove("show");
  };
  document.getElementById("api-input").onkeydown=function(e){if(e.key==="Enter")document.getElementById("api-save").click();};
})();
</script>
</body>
</html>
